<!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WorkNest - Projects</title>
        <link rel="stylesheet" href="/static/css/style.css">
    </head>

    <body>
        <div class="app-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-logo">🪺 WorkNest</div>
                <nav class="sidebar-nav">
                    <a href="/dashboard" class="nav-item">📊 Dashboard</a>
                    <a href="/projects" class="nav-item active">📁 Projects</a>
                    <a href="/tasks" class="nav-item">✅ Tasks</a>
                </nav>
                <div class="sidebar-footer">
                    <div id="user-info"></div>
                    <button class="btn btn-outline btn-logout w-full" onclick="logout()">Logout</button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div class="page-header">
                    <h2>Projects</h2>
                    <button class="btn btn-primary admin-only" onclick="openProjectModal()">+ New Project</button>
                </div>

                <div id="projects-grid" class="projects-grid"></div>
            </main>
        </div>

        <!-- Create/Edit Project Modal -->
        <div id="project-modal" class="modal" style="display:none">
            <div class="modal-box">
                <div class="modal-header">
                    <h3 id="modal-title">New Project</h3>
                    <button onclick="closeProjectModal()">✕</button>
                </div>
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="project-name" placeholder="Enter project name">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="project-desc" placeholder="Enter description"></textarea>
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="date" id="project-deadline">
                </div>
                <div id="project-error" class="error-msg"></div>
                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="closeProjectModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
                </div>
            </div>
        </div>

        <!-- Add Member Modal -->
        <div id="member-modal" class="modal" style="display:none">
            <div class="modal-box">
                <div class="modal-header">
                    <h3>Add Member</h3>
                    <button onclick="closeMemberModal()">✕</button>
                </div>
                <div class="form-group">
                    <label>Select Member</label>
                    <select id="member-select"></select>
                </div>
                <div id="member-error" class="error-msg"></div>
                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="closeMemberModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="addMember()">Add Member</button>
                </div>
            </div>
        </div>

        <script src="/static/js/main.js"></script>
        <script src="/static/js/projects.js"></script>
    </body>

    </html>
