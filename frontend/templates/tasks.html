<!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WorkNest - Tasks</title>
        <link rel="stylesheet" href="/static/css/style.css">
    </head>

    <body>
        <div class="app-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-logo">🪺 WorkNest</div>
                <nav class="sidebar-nav">
                    <a href="/dashboard" class="nav-item">📊 Dashboard</a>
                    <a href="/projects" class="nav-item">📁 Projects</a>
                    <a href="/tasks" class="nav-item active">✅ Tasks</a>
                </nav>
                <div class="sidebar-footer">
                    <div id="user-info"></div>
                    <button class="btn btn-outline btn-logout w-full" onclick="logout()">Logout</button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div class="page-header">
                    <h2>Tasks</h2>
                    <button class="btn btn-primary admin-only" onclick="openTaskModal()">+ New Task</button>
                </div>

                <!-- Filters -->
                <div class="filters">
                    <select id="filter-project" onchange="loadTasks()">
                        <option value="">All Projects</option>
                    </select>
                    <select id="filter-status" onchange="loadTasks()">
                        <option value="">All Status</option>
                        <option value="todo">Todo</option>
                        <option value="in_progress">In Progress</option>
                        <option value="done">Done</option>
                    </select>
                    <select id="filter-priority" onchange="loadTasks()">
                        <option value="">All Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <!-- Tasks Table -->
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Project</th>
                                <th>Assigned To</th>
                                <th>Status</th>
                                <th>Priority</th>
                                <th>Deadline</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tasks-body"></tbody>
                    </table>
                </div>
            </main>
        </div>

        <!-- Create/Edit Task Modal -->
        <div id="task-modal" class="modal" style="display:none">
            <div class="modal-box">
                <div class="modal-header">
                    <h3 id="task-modal-title">New Task</h3>
                    <button onclick="closeTaskModal()">✕</button>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="task-title" placeholder="Enter task title">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="task-desc" placeholder="Enter description"></textarea>
                </div>
                <div class="form-group">
                    <label>Project</label>
                    <select id="task-project"></select>
                </div>
                <div class="form-group">
                    <label>Assign To</label>
                    <select id="task-assignee"></select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="task-priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="date" id="task-deadline">
                </div>
                <div id="task-error" class="error-msg"></div>
                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="closeTaskModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
                </div>
            </div>
        </div>

        <!-- Update Status Modal -->
        <div id="status-modal" class="modal" style="display:none">
            <div class="modal-box">
                <div class="modal-header">
                    <h3>Update Status</h3>
                    <button onclick="closeStatusModal()">✕</button>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="task-status">
                        <option value="todo">Todo</option>
                        <option value="in_progress">In Progress</option>
                        <option value="done">Done</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="closeStatusModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="updateStatus()">Update</button>
                </div>
            </div>
        </div>

        <script src="/static/js/main.js"></script>
        <script src="/static/js/tasks.js"></script>
    </body>

    </html>
