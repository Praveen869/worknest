<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkNest - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <h1>🪺 WorkNest</h1>
                <p>Team Task Manager</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password">
                </div>
                <div id="login-error" class="error-msg"></div>
                <button class="btn btn-primary w-full" onclick="login()">Login</button>
            </div>

            <!-- Signup Form -->
            <div id="signup-form" style="display:none">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Enter your password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="signup-role">
                        <option value="member">Member</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div id="signup-error" class="error-msg"></div>
                <button class="btn btn-primary w-full" onclick="signup()">Create Account</button>
            </div>
        </div>
    </div>
    <script src="/static/js/auth.js"></script>
</body>

</html>
